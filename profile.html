<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        :root {
            --accent: #FF007F; /* Hot Pink */
            --accent-secondary: #00F2FF; /* Electric Cyan */
            --accent-tertiary: #7000FF; /* Deep Purple */
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .font-display {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
        }

        .text-gradient {
            background: linear-gradient(to right, var(--accent), var(--accent-secondary), var(--accent-tertiary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: gradientText 5s linear infinite;
        }

        @keyframes gradientText {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .bg-gradient {
            background: linear-gradient(135deg, var(--accent), var(--accent-tertiary));
        }

        .hero-title {
            font-size: clamp(3.5rem, 18vw, 10rem);
            line-height: 0.8;
            font-weight: 900;
            letter-spacing: -0.06em;
            text-transform: uppercase;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .bento-item {
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .bento-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent, rgba(255, 0, 127, 0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .bento-item:hover::before {
            transform: translateX(100%);
        }

        .bento-item:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 30px 60px -12px rgba(255, 0, 127, 0.4);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #050505;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(var(--accent), var(--accent-tertiary));
            border-radius: 20px;
            border: 2px solid #050505;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }

        .float {
            animation: float 8s ease-in-out infinite;
        }

        .glow-dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 15px 5px var(--accent);
        }

        input, textarea, select {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 1.25rem;
            border-radius: 1.25rem;
            outline: none;
            width: 100%;
            transition: all 0.4s;
            font-size: 0.9rem;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 5px rgba(255, 0, 127, 0.15);
        }

        .tab-active {
            color: var(--accent);
            position: relative;
        }

        .tab-active::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--accent);
            border-radius: 4px;
            box-shadow: 0 0 10px var(--accent);
        }

        .card-reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .card-reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

        const sendTelegramMessage = async (message, config) => {
            if (!config || !config.botToken || !config.chatId) return;
            const url = `https://api.telegram.org/bot${config.botToken}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: config.chatId,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
            } catch (e) {
                console.error("Failed to send Telegram message", e);
            }
        };

        // --- Icons Component ---
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

                yearsExp: "4+",

            ],

        // --- Components ---

        const Navbar = ({ activeTab, setActiveTab, isAdmin, setIsAdmin }) => {

                                Let's Talk
                            </button>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 w-full max-w-3xl mx-auto px-4">
                            {data.channels?.map(channel => (
                                <a 
                                    key={channel.id}

            );
        };

        const Skills = ({ data }) => (
            <section className="py-24 px-6 max-w-7xl mx-auto animate-fade-in">
                <div className="grid lg:grid-cols-2 gap-16 items-center">
                    <div>
                        <p className="text-xs font-bold tracking-[0.3em] text-accent uppercase mb-4">Mastery</p>
                        <h2 className="text-5xl md:text-7xl font-display font-black uppercase mb-8">Technical <span className="text-gradient">Skills</span></h2>
                        <p className="text-white/50 text-lg mb-12 leading-relaxed">

                        </p>
                        <div className="grid grid-cols-2 gap-4">
                            <div className="glass p-6 rounded-2xl border-white/5">

                </div>
                <div className="bento-grid">
                    {data.projects?.map((p, i) => (
                        <div key={p.id} className="bento-item glass rounded-3xl overflow-hidden group">
                            <div className="relative aspect-[4/3] overflow-hidden">
                                <img src={p.image} alt={p.title} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" referrerPolicy="no-referrer" />
                                <div className="absolute inset-0 bg-gradient-to-t from-gray-950 via-transparent to-transparent opacity-60" />

        const Reviews = ({ data, reviews, setReviews }) => {
            const [newReview, setNewReview] = useState({ project: data.projects?.[0]?.title || 'General', user: '', rating: 5, comment: '' });

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!newReview.user || !newReview.comment) return;
                
                const reviewData = { 
                    ...newReview, 
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                };

                try {
                    await db.ref('esparks_reviews').push(reviewData);
                    
                    const message = `🌟 <b>New Review for E-sparks!</b>\n\n<b>User:</b> ${newReview.user}\n<b>Project:</b> ${newReview.project}\n<b>Rating:</b> ${'⭐'.repeat(newReview.rating)}\n<b>Comment:</b> ${newReview.comment}`;
                    await sendTelegramMessage(message, data.telegramConfig);

                    setNewReview({ ...newReview, user: '', comment: '' });
                } catch (e) {
                    console.error("Error adding review", e);
                    alert("Failed to post review.");
                }

            return (
                <section className="py-24 px-6 max-w-7xl mx-auto animate-fade-in">

            const [clickCount, setClickCount] = useState(0);
            const [data, setData] = useState(DEFAULT_DATA);
            const [reviews, setReviews] = useState([]);
            const [isAuthReady, setIsAuthReady] = useState(false);

            // Fetch Portfolio Data
            useEffect(() => {
                const ref = db.ref('esparks_portfolio/main');
                const onValueChange = ref.on('value', (snapshot) => {
                    if (snapshot.exists()) {
                        const cloudData = snapshot.val();
                        setData(prev => ({
                            ...prev,
                            ...cloudData,
                            profile: { ...prev.profile, ...cloudData.profile },
                            socials: { ...prev.socials, ...cloudData.socials },
                            telegramConfig: { ...prev.telegramConfig, ...cloudData.telegramConfig }
                        }));
                    } else {
                        ref.set(DEFAULT_DATA);
                    }
                });
                return () => ref.off('value', onValueChange);
            }, []);

            // Fetch Reviews
            useEffect(() => {
                const ref = db.ref('esparks_reviews');
                const onValueChange = ref.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const revList = Object.keys(data).map(key => ({
                            id: key,
                            ...data[key]
                        })).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                        setReviews(revList);
                    } else {
                        setReviews([]);
                    }
                });
                return () => ref.off('value', onValueChange);
            }, []);

            const handleNameClick = () => {
                setClickCount(prev => {
                    const next = prev + 1;
                    if (next === 50) {
                        const pass = prompt("Enter Admin Password:");
                        if (pass === "esparks-admin") {
                            setIsAdmin(true);
                            setActiveTab('home');
                        } else if (pass !== null) {
                            alert("Access Denied.");
                        }
                        return 0;
                    }
                    return next;
                });
            };

            const renderContent = () => {
                if (isAdmin) return <AdminPanel data={data} setData={setData} reviews={reviews} />;
                switch (activeTab) {
                    case 'home': return <Hero data={data} setActiveTab={setActiveTab} onNameClick={handleNameClick} />;
                    case 'portfolio': return (
                        <>
                            <Portfolio data={data} />
                            <Skills data={data} />
                        </>
                    );
                    case 'services': return <Services data={data} />;
                    case 'reviews': return <Reviews data={data} reviews={reviews} setReviews={setReviews} />;
                    case 'contact': return <Contact data={data} />;
                    default: return <Hero data={data} setActiveTab={setActiveTab} onNameClick={handleNameClick} />;
                }
            };

            return (
                <div className="bg-gray-950 text-white selection:bg-purple-500 selection:text-white min-h-screen flex flex-col">
                    <Navbar activeTab={activeTab} setActiveTab={setActiveTab} isAdmin={isAdmin} setIsAdmin={setIsAdmin} />
                    <main className="flex-grow">
                        {renderContent()}
                    </main>
                    <footer className="py-12 px-6 border-t border-white/5 text-center bg-gray-950">
                        <p className="text-[10px] text-white/20 uppercase font-black tracking-[0.3em]">© 2026 E-sparks Creative Studio. All rights reserved.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
